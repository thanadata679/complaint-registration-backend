<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complaint Registration Portal</title>
  <meta name="description"
    content="Submit and track your complaints easily through our secure Complaint Registration Portal." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    /* ── Reset & Base ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0f1a;
      --surface: #131626;
      --card: #1a1e35;
      --border: #2a2f52;
      --accent1: #6c63ff;
      --accent2: #a78bfa;
      --accent3: #38bdf8;
      --success: #22d3a5;
      --danger: #f87171;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --radius: 14px;
      --glow: 0 0 32px rgba(108, 99, 255, .35);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(108, 99, 255, .18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(56, 189, 248, .10) 0%, transparent 55%);
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown .6s ease both;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      font-size: .85rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent2);
      background: rgba(108, 99, 255, .12);
      border: 1px solid rgba(108, 99, 255, .3);
      border-radius: 50px;
      padding: .4rem 1rem;
      margin-bottom: 1.2rem;
    }

    .logo svg {
      width: 16px;
      height: 16px;
    }

    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    header p {
      color: var(--muted);
      margin-top: .6rem;
      font-size: .95rem;
    }

    /* ── Form Card ── */
    .form-card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.2rem 2.4rem;
      box-shadow: var(--glow), 0 24px 64px rgba(0, 0, 0, .4);
      animation: fadeUp .6s ease .1s both;
    }

    .form-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.6rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      color: var(--text);
    }

    .form-card h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 18px;
      background: linear-gradient(180deg, var(--accent1), var(--accent3));
      border-radius: 4px;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .45rem;
    }

    input,
    textarea,
    select {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: .75rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: .95rem;
      transition: border-color .25s, box-shadow .25s;
      outline: none;
      resize: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: #4a5278;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--accent1);
      box-shadow: 0 0 0 3px rgba(108, 99, 255, .2);
    }

    textarea {
      height: 110px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* character counter */
    .char-info {
      text-align: right;
      font-size: .75rem;
      color: var(--muted);
      margin-top: .3rem;
    }

    /* ── Submit Button ── */
    .btn-submit {
      width: 100%;
      margin-top: .6rem;
      padding: .9rem;
      background: linear-gradient(135deg, var(--accent1) 0%, #8b5cf6 100%);
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: .03em;
      transition: transform .2s, box-shadow .2s, opacity .2s;
      box-shadow: 0 4px 24px rgba(108, 99, 255, .4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(108, 99, 255, .55);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    /* ── Success Toast ── */
    #toast {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--success);
      color: #0f2820;
      font-weight: 700;
      padding: .8rem 1.4rem;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(34, 211, 165, .35);
      transform: translateX(120%);
      transition: transform .35s cubic-bezier(.34, 1.56, .64, 1);
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    #toast.show {
      transform: translateX(0);
    }

    /* ── Complaints Section ── */
    .complaints-section {
      width: 100%;
      max-width: 860px;
      margin-top: 3rem;
      animation: fadeUp .6s ease .25s both;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }

    .section-header h2 {
      font-size: 1.15rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .badge {
      background: linear-gradient(135deg, var(--accent1), var(--accent3));
      color: #fff;
      font-size: .75rem;
      font-weight: 700;
      padding: .2rem .6rem;
      border-radius: 50px;
      min-width: 26px;
      text-align: center;
    }

    .filter-bar {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-bar input {
      width: 200px;
      padding: .5rem .9rem;
      font-size: .85rem;
    }

    .btn-clear-all {
      background: rgba(248, 113, 113, .12);
      border: 1px solid rgba(248, 113, 113, .35);
      color: var(--danger);
      font-family: inherit;
      font-size: .82rem;
      font-weight: 600;
      padding: .5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-clear-all:hover {
      background: rgba(248, 113, 113, .22);
    }

    /* ── Complaint Cards Grid ── */
    #complaint-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }

    .complaint-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.3rem;
      position: relative;
      overflow: hidden;
      animation: cardIn .4s ease both;
      transition: border-color .2s, transform .2s;
    }

    .complaint-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent1), var(--accent3));
    }

    .complaint-card:hover {
      border-color: var(--accent1);
      transform: translateY(-3px);
    }

    .card-name {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: .2rem;
    }

    .card-meta {
      font-size: .78rem;
      color: var(--muted);
      margin-bottom: .85rem;
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
    }

    .card-meta span {
      display: flex;
      align-items: center;
      gap: .25rem;
    }

    .card-complaint {
      font-size: .88rem;
      color: #c7d2e8;
      line-height: 1.6;
      background: var(--surface);
      border-radius: 8px;
      padding: .65rem .8rem;
      border-left: 3px solid var(--accent1);
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: .9rem;
      font-size: .72rem;
      color: #4a5278;
    }

    .btn-delete {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: .78rem;
      font-weight: 600;
      opacity: .7;
      transition: opacity .2s;
      padding: .2rem .5rem;
      border-radius: 6px;
    }

    .btn-delete:hover {
      opacity: 1;
      background: rgba(248, 113, 113, .1);
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }

    .empty-state svg {
      width: 56px;
      height: 56px;
      opacity: .35;
      margin-bottom: 1rem;
    }

    .empty-state p {
      font-size: .95rem;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.4rem;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .6rem 1.1rem;
      font-size: .82rem;
      display: flex;
      align-items: center;
      gap: .45rem;
      color: var(--muted);
    }

    .stat-chip strong {
      color: var(--text);
      font-size: .95rem;
    }

    /* ── AI Section ── */
    .ai-section {
      display: none;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px dashed var(--border);
      animation: fadeDown .4s ease both;
    }

    .ai-section.active {
      display: block;
    }

    .ai-question-box {
      background: rgba(108, 99, 255, .08);
      border-left: 3px solid var(--accent1);
      padding: .8rem 1rem;
      border-radius: 0 8px 8px 0;
      margin-bottom: 1rem;
      font-size: .9rem;
      color: #e2e8f0;
      line-height: 1.5;
    }

    .ai-question-box strong {
      display: block;
      color: var(--accent2);
      margin-bottom: .3rem;
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    /* Loading Spinner */
    .loader {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, .3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: scale(.96);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .form-card {
        padding: 1.6rem 1.2rem;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .filter-bar input {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <!-- ── Header ── -->
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path
          d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
      </svg>
      Complaint Portal
    </div>
    <h1>Register Your Complaint</h1>
    <p>We take every complaint seriously. Fill in the form below.</p>
  </header>

  <!-- ── Form Card ── -->
  <div class="form-card" id="form-card">
    <h2>New Complaint</h2>
    <form id="complaint-form" novalidate>

      <div class="form-row">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="e.g. Rahul Sharma" maxlength="60" required />
        </div>
        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" placeholder="e.g. Mumbai" maxlength="40" required />
        </div>
      </div>

      <div class="form-group">
        <label for="mobile">Mobile Number</label>
        <input type="tel" id="mobile" placeholder="e.g. 9876543210" maxlength="15" required />
      </div>

      <div class="form-group">
        <label for="complaint">Complaint Details</label>
        <textarea id="complaint" placeholder="Describe your complaint in detail…" maxlength="500" required></textarea>
        <div class="char-info"><span id="char-count">0</span> / 500</div>
      </div>

      <!-- AI Follow-up Section -->
      <div class="ai-section" id="ai-section">
        <div class="ai-question-box">
          <strong>AI Follow-up Question</strong>
          <span id="ai-question-text">Loading question...</span>
        </div>
        <div class="form-group">
          <label for="ai-answer">Your Answer</label>
          <textarea id="ai-answer" placeholder="Please answer the question above…" required></textarea>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        <svg id="submit-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.3">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
        <div class="loader" id="submit-loader"></div>
        <span id="submit-text">Next: Generate Follow-up</span>
      </button>
    </form>
  </div>

  <!-- ── Complaints Dashboard ── -->
  <section class="complaints-section" id="complaints-section">
    <div class="section-header">
      <h2>
        Registered Complaints
        <span class="badge" id="count-badge">0</span>
      </h2>
      <div class="filter-bar">
        <input type="text" id="search-input" placeholder="🔍  Search complaints…" oninput="renderComplaints()" />
        <button class="btn-clear-all" id="clear-all-btn" onclick="clearAll()">🗑 Clear All</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Cards -->
    <div id="complaint-list"></div>
  </section>

  <!-- ── Toast ── -->
  <div id="toast">
    ✅ Complaint registered successfully!
  </div>

  <script>
    /* ─── Gemini API Config ─── */
    // IMPORTANT: Replace this with your actual Gemini API Key
    const GEMINI_API_KEY = 'AIzaSyBj9isg3qRl6FJNsy7zqZHzqBFkPIg8rCA';

    /* ─── Storage helpers ─── */
    const STORE_KEY = 'complaints_v1';

    function loadComplaints() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
      catch { return []; }
    }

    function saveComplaints(data) {
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
    }

    /* ─── Character counter ─── */
    const complaintTA = document.getElementById('complaint');
    const charCount = document.getElementById('char-count');
    complaintTA.addEventListener('input', () => {
      charCount.textContent = complaintTA.value.length;
    });

    /* ─── Form submit ─── */
    let isAiQuestionGenerated = false;
    let generatedAiQuestion = "";

    document.getElementById('complaint-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const city = document.getElementById('city').value.trim();
      const mobile = document.getElementById('mobile').value.trim();
      const complaint = complaintTA.value.trim();

      // Basic validation
      if (!name || !city || !mobile || !complaint) {
        shakeCard(); return;
      }
      if (!/^[0-9+\-\s]{7,15}$/.test(mobile)) {
        alert('Please enter a valid mobile number.'); return;
      }

      if (!isAiQuestionGenerated) {
        // Step 1: Generate AI Question
        await handleGenerateQuestion(complaint);
      } else {
        // Step 2: Final Submit
        const aiAnswer = document.getElementById('ai-answer').value.trim();
        if (!aiAnswer) {
          shakeCard();
          document.getElementById('ai-answer').focus();
          return;
        }

        const entry = {
          id: crypto.randomUUID(),
          name, city, mobile, complaint,
          aiQuestion: generatedAiQuestion,
          aiAnswer: aiAnswer,
          timestamp: new Date().toISOString()
        };

        const data = loadComplaints();
        data.unshift(entry);
        saveComplaints(data);

        // Reset Form
        this.reset();
        charCount.textContent = '0';
        document.getElementById('ai-section').classList.remove('active');
        isAiQuestionGenerated = false;
        document.getElementById('submit-text').textContent = 'Next: Generate Follow-up';
        document.getElementById('submit-icon').style.display = 'block';

        showToast();
        renderComplaints();
      }
    });

    async function handleGenerateQuestion(complaintText) {
      const btn = document.getElementById('submit-btn');
      const loader = document.getElementById('submit-loader');
      const icon = document.getElementById('submit-icon');
      const btnText = document.getElementById('submit-text');

      // Show loading
      btn.disabled = true;
      icon.style.display = 'none';
      loader.style.display = 'block';
      btnText.textContent = 'Generating...';

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{
              parts: [{ text: `A user has submitted the following complaint: "${complaintText}". Please ask one specific follow-up question to get more necessary details about this complaint. Only output the question itself, without any introduction or formatting.` }]
            }]
          })
        });

        if (!response.ok) {
          throw new Error('Failed to fetch from Gemini API');
        }

        const data = await response.json();
        const question = data.candidates[0].content.parts[0].text.trim();

        generatedAiQuestion = question;
        document.getElementById('ai-question-text').textContent = question;
        document.getElementById('ai-section').classList.add('active');
        isAiQuestionGenerated = true;

        // Update button for final submission
        loader.style.display = 'none';
        icon.style.display = 'block';
        btnText.textContent = 'Submit Complaint';

        // Focus the answer field
        setTimeout(() => document.getElementById('ai-answer').focus(), 100);

      } catch (error) {
        console.error("AI Generation Error:", error);
        alert("Could not generate a follow-up question. Please check your API key or network connection.");
        // Revert button state so they can try again
        loader.style.display = 'none';
        icon.style.display = 'block';
        btnText.textContent = 'Next: Generate Follow-up';
      } finally {
        btn.disabled = false;
      }
    }

    /* ─── Delete one ─── */
    function deleteComplaint(id) {
      const data = loadComplaints().filter(c => c.id !== id);
      saveComplaints(data);
      renderComplaints();
    }

    /* ─── Clear all ─── */
    function clearAll() {
      if (!loadComplaints().length) return;
      if (confirm('Are you sure you want to delete ALL complaints? This cannot be undone.')) {
        saveComplaints([]);
        renderComplaints();
      }
    }

    /* ─── Render ─── */
    function renderComplaints() {
      const all = loadComplaints();
      const query = document.getElementById('search-input').value.toLowerCase();
      const list = document.getElementById('complaint-list');
      const badge = document.getElementById('count-badge');
      const stats = document.getElementById('stats-bar');

      const filtered = query
        ? all.filter(c =>
          c.name.toLowerCase().includes(query) ||
          c.city.toLowerCase().includes(query) ||
          c.complaint.toLowerCase().includes(query) ||
          c.mobile.includes(query)
        )
        : all;

      badge.textContent = all.length;

      /* Stats */
      const cities = [...new Set(all.map(c => c.city))];
      stats.innerHTML = `
      <div class="stat-chip">📋 Total &nbsp;<strong>${all.length}</strong></div>
      <div class="stat-chip">🏙️ Cities &nbsp;<strong>${cities.length}</strong></div>
      ${all.length ? `<div class="stat-chip">📅 Latest &nbsp;<strong>${formatDate(all[0].timestamp)}</strong></div>` : ''}
    `;

      /* Cards */
      if (!filtered.length) {
        list.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <p>${all.length ? 'No complaints match your search.' : 'No complaints yet. Submit one above!'}</p>
        </div>`;
        return;
      }

      list.innerHTML = filtered.map(c => `
      <div class="complaint-card" id="card-${c.id}">
        <div class="card-name">${escHtml(c.name)}</div>
        <div class="card-meta">
          <span>🏙️ ${escHtml(c.city)}</span>
          <span>📱 ${escHtml(c.mobile)}</span>
        </div>
        <div class="card-complaint">${escHtml(c.complaint)}</div>
        ${c.aiQuestion ? `
          <div class="card-complaint" style="margin-top: .6rem; border-left-color: var(--accent2); background: rgba(167, 139, 250, 0.05);">
            <strong style="color: var(--accent2); font-size: .75rem; text-transform: uppercase;">AI Follow-up:</strong><br/>
            ${escHtml(c.aiQuestion)}
            <div style="margin-top: .4rem; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: .4rem;">
              <strong style="color: var(--accent1); font-size: .75rem; text-transform: uppercase;">User Answer:</strong><br/>
              ${escHtml(c.aiAnswer)}
            </div>
          </div>
        ` : ''}
        <div class="card-footer">
          <span>${formatDate(c.timestamp)}</span>
          <button class="btn-delete" onclick="deleteComplaint('${c.id}')">🗑 Delete</button>
        </div>
      </div>
    `).join('');
    }

    /* ─── Helpers ─── */
    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' })
        + ' ' + d.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    function shakeCard() {
      const card = document.getElementById('form-card');
      card.style.animation = 'none';
      card.style.outline = '2px solid var(--danger)';
      setTimeout(() => { card.style.outline = ''; }, 700);
    }

    /* ─── Init ─── */
    renderComplaints();
  </script>
</body>

</html>
